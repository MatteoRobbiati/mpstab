name: Tests

on:
  workflow_dispatch:
  push:
  merge_group:
  pull_request:
    types: [labeled, opened]

jobs:
  build:
    if: contains(github.event.pull_request.labels.*.name, 'run-workflow') || github.event_name == 'push'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    uses: qiboteam/workflows/.github/workflows/rules-poetry.yml@v1
    with:
      os: ${{ matrix.os }}
      python-version: ${{ matrix.python-version }}
      doctests: false
      poetry-extras: "--with tests"
    secrets: inherit

  coverage:
    name: Upload coverage to Codecov
    runs-on: ubuntu-latest
    needs: build   # wait until tests finish
    environment: Codecov   # 👈 if you stored the secret in an environment
    steps:
      - uses: actions/checkout@v4

      # Download coverage report artifact from the build job
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report   # must match what your tests job uploads

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml   # adjust to your actual coverage file
          fail_ci_if_error: true
